<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>Discovery — Registro de Visitas y Acompañantes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --clay: #C4956A;
  --rust: #B85C3A;
  --ocean: #2D5F6E;
  --sage: #7A8B6F;
  --ink: #1A1714;
  --paper: #F5F0E8;
  --paper-dark: #EDE6D9;
  --sand: #E8DFD0;
  --white: #FEFCF8;
  --grey: #6B6560;
  --grey-light: #9B9590;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}

body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* ===== PIN GATE ===== */
#pinGate {
  position: fixed; inset: 0; z-index: 99999;
  background: linear-gradient(135deg, var(--ink) 0%, #2a2520 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
#pinGate .pin-box {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,.3);
  padding: 36px 28px;
  max-width: 340px; width: 100%;
  text-align: center;
}
#pinGate h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; color: var(--ink);
  margin-bottom: 4px;
}
#pinGate p.sub {
  font-size: 13px; color: var(--grey);
  margin-bottom: 20px;
}
#pinGate input {
  width: 100%; font-size: 28px;
  letter-spacing: 12px; text-align: center;
  padding: 14px; border: 2px solid var(--sand);
  border-radius: 12px; outline: none;
  background: var(--paper); color: var(--ink);
}
#pinGate input:focus { border-color: var(--rust); }
#pinGate button {
  margin-top: 16px; width: 100%;
  background: var(--rust); color: #fff;
  border: none; border-radius: 12px;
  padding: 14px; font-size: 15px;
  font-weight: 600; cursor: pointer;
  transition: background .15s;
}
#pinGate button:hover { background: var(--ocean); }
#pinGate .err { color: #c62828; font-size: 13px; height: 18px; margin-top: 10px; }
body.locked { overflow: hidden; }

/* ===== HEADER ===== */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--sand);
  padding: 14px 20px;
  padding-top: max(14px, env(safe-area-inset-top));
  flex-shrink: 0;
}
.header-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--clay); margin-bottom: 2px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 900;
  line-height: 1.2; color: var(--ink);
}
.header .sub {
  font-size: 13px; color: var(--grey);
  margin-top: 2px;
}

/* ===== CHAT AREA ===== */
.chat-area {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex; flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.msg {
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}
.msg.agent { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.msg-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--grey-light);
  margin-bottom: 3px;
  padding: 0 4px;
}
.msg.user .msg-label { text-align: right; }

.msg-bubble {
  padding: 12px 16px;
  line-height: 1.6;
  font-size: 15px;
  border-radius: 16px;
  word-wrap: break-word;
}
.msg.agent .msg-bubble {
  background: var(--white);
  border: 1px solid var(--sand);
  border-bottom-left-radius: 4px;
  color: var(--ink);
}
.msg.user .msg-bubble {
  background: var(--rust);
  border-bottom-right-radius: 4px;
  color: #fff;
}

/* ===== TYPING INDICATOR ===== */
.typing { align-self: flex-start; }
.typing .msg-bubble {
  background: var(--white);
  border: 1px solid var(--sand);
  border-bottom-left-radius: 4px;
  padding: 14px 20px;
  display: flex; gap: 5px; align-items: center;
}
.typing .dot {
  width: 7px; height: 7px;
  background: var(--clay);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }

/* ===== WELCOME STATE ===== */
.welcome {
  flex: 1; display: flex;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 20px;
  color: var(--grey-light);
}
.welcome p { font-size: 14px; line-height: 1.6; }

/* ===== INPUT AREA ===== */
.input-area {
  flex-shrink: 0;
  background: var(--white);
  border-top: 1px solid var(--sand);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex; gap: 10px;
  align-items: flex-end;
}
.input-area textarea {
  flex: 1; resize: none;
  border: 1px solid var(--sand);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 16px; /* prevents zoom on iOS */
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  max-height: 100px;
  min-height: 42px;
  overflow-y: auto;
}
.input-area textarea:focus { border-color: var(--rust); }
.input-area textarea::placeholder { color: var(--grey-light); }

.send-btn {
  width: 44px; height: 44px;
  border: none; border-radius: 50%;
  background: var(--rust); color: #fff;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, opacity 0.15s;
}
.send-btn:hover { background: var(--ocean); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.1em;
  color: var(--grey-light);
  padding: 6px 0 2px;
  background: var(--white);
}

/* ===== VOICE TOGGLE ===== */
.voice-toggle {
  text-align: center;
  padding: 6px 16px 0;
  background: var(--paper);
}
.voice-toggle button {
  background: none; border: 1px solid var(--sand);
  border-radius: 20px; padding: 6px 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px; color: var(--grey);
  cursor: pointer; display: inline-flex;
  align-items: center; gap: 6px;
  transition: all 0.2s;
}
.voice-toggle button.active {
  background: var(--ocean); color: #fff;
  border-color: var(--ocean);
}
.voice-toggle button.active svg { stroke: #fff; }

/* ===== MIC BUTTON ===== */
.mic-btn {
  width: 44px; height: 44px;
  border: 2px solid var(--ocean); border-radius: 50%;
  background: var(--white); color: var(--ocean);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.mic-btn:hover { background: var(--ocean); color: #fff; }
.mic-btn:hover svg { stroke: #fff; }
.mic-btn.recording {
  background: #c62828; border-color: #c62828;
  animation: pulse 1.5s infinite;
}
.mic-btn.recording svg { stroke: #fff; }
.mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(198,40,40,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(198,40,40,0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}
</style>
</head>
<body class="locked">

<!-- PIN GATE -->
<div id="pinGate">
  <div class="pin-box">
    <h2>Club Tres Marías</h2>
    <p class="sub">Ingresa el PIN para continuar</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••">
    <div class="err" id="pinErr"></div>
    <button type="button" id="pinBtn">Entrar</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="header">
  <div class="header-label">ozom.ai · discovery</div>
  <h1>Entrevista Discovery</h1>
  <div class="sub">Registro de Visitas y Acompañantes</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <p>Conectando con el asistente...</p>
  </div>
</div>

<div class="voice-toggle" id="voiceToggle">
  <button id="voiceModeBtn" aria-label="Activar modo voz">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <span id="voiceLabel">Activar voz</span>
  </button>
</div>
<div class="input-area">
  <textarea id="msgInput" placeholder="Escribe tu respuesta..." rows="1" disabled></textarea>
  <button class="mic-btn" id="micBtn" disabled aria-label="Grabar voz" style="display:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button class="send-btn" id="sendBtn" disabled aria-label="Enviar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
<div class="footer">powered by ozom.ai</div>

<script>
// ===== CONFIGURATION =====
const API_URL = "https://discovery-api.darrieta87.workers.dev";
const BRIEF_ID = "registro-visitas-acompanantes";

// ===== PIN GATE =====
(function(){
  var PIN="0717", KEY="3m_discovery_pin";
  function unlock(){
    var g=document.getElementById('pinGate');
    if(g) g.style.display='none';
    document.body.classList.remove('locked');
    initChat();
  }
  if(sessionStorage.getItem(KEY)==="1"){ unlock(); return; }
  function tryPin(){
    var inp=document.getElementById('pinInput');
    if(inp.value.trim()===PIN){ sessionStorage.setItem(KEY,"1"); unlock(); }
    else{ document.getElementById('pinErr').textContent='PIN incorrecto'; inp.value=''; }
  }
  document.getElementById('pinBtn').addEventListener('click',tryPin);
  document.getElementById('pinInput').addEventListener('keydown',function(e){ if(e.key==='Enter') tryPin(); });
})();

// ===== CHAT LOGIC =====
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');

const SESSION_KEY = `discovery_session_${BRIEF_ID}`;
const sessionId = localStorage.getItem(SESSION_KEY) || (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
localStorage.setItem(SESSION_KEY, sessionId);
const micBtn = document.getElementById('micBtn');
const voiceModeBtn = document.getElementById('voiceModeBtn');
const voiceLabel = document.getElementById('voiceLabel');
let isSending = false;
let voiceMode = false;
let recognition = null;

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function addMessage(role, text) {
  if (welcome && welcome.parentNode) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'agent' ? 'Asistente AI' : 'Tú';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  msg.appendChild(label);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function showTyping() {
  if (welcome && welcome.parentNode) welcome.remove();
  const el = document.createElement('div');
  el.className = 'msg typing';
  el.id = 'typingIndicator';
  el.innerHTML = '<div class="msg-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chatArea.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setInputEnabled(enabled) {
  isSending = !enabled;
  msgInput.disabled = !enabled;
  sendBtn.disabled = !enabled;
  micBtn.disabled = !enabled;
  if (enabled && !voiceMode) msgInput.focus();
}

async function sendMessage(text) {
  if (isSending) return;

  if (text && text !== '__init__') {
    addMessage('user', text);
  }

  setInputEnabled(false);
  showTyping();

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        message: text || '__init__',
        brief_id: BRIEF_ID,
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    hideTyping();
    const bubble = addMessage('agent', '');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          if (parsed.text) {
            fullText += parsed.text;
            bubble.textContent = fullText;
            scrollToBottom();
          }
          if (parsed.error) {
            bubble.textContent = 'Hubo un problema. Intenta de nuevo.';
          }
        } catch { /* skip */ }
      }
    }
    if (voiceMode && fullText) {
      speakText(fullText);
    }
  } catch (err) {
    console.error('Chat error:', err);
    hideTyping();
    addMessage('agent', 'Hubo un problema de conexión. Intenta de nuevo en unos segundos.');
  }

  setInputEnabled(true);
}

async function speakText(text) {
  try {
    const res = await fetch(`${API_URL}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    audio.play();
  } catch (e) {
    console.error('TTS error:', e);
  }
}

// Auto-grow textarea
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Send on button click
sendBtn.addEventListener('click', function() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendMessage(text);
});

// Send on Enter (Shift+Enter for newline)
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendMessage(text);
  }
});

// ===== VOICE MODE =====
voiceModeBtn.addEventListener('click', function() {
  voiceMode = !voiceMode;
  voiceModeBtn.classList.toggle('active', voiceMode);
  voiceLabel.textContent = voiceMode ? 'Voz activada' : 'Activar voz';
  micBtn.style.display = voiceMode ? 'flex' : 'none';
});

micBtn.addEventListener('click', function() {
  if (isSending) return;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addMessage('agent', 'Tu navegador no soporta reconocimiento de voz. Usa Chrome o Safari.');
    return;
  }

  if (recognition) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'es-MX';
  recognition.continuous = false;
  recognition.interimResults = false;

  micBtn.classList.add('recording');

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    micBtn.classList.remove('recording');
    recognition = null;
    if (text.trim()) {
      msgInput.value = text;
      sendMessage(text.trim());
      msgInput.value = '';
    }
  };

  recognition.onerror = function(e) {
    console.error('Speech error:', e.error);
    micBtn.classList.remove('recording');
    recognition = null;
    if (e.error === 'not-allowed') {
      addMessage('agent', 'Necesito permiso para usar el micrófono. Revisa los permisos de tu navegador.');
    }
  };

  recognition.onend = function() {
    micBtn.classList.remove('recording');
    recognition = null;
  };

  recognition.start();
});

function initChat() {
  sendMessage('__init__');
}
</script>
</body>
</html>
